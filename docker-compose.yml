services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_DB: databot
      POSTGRES_USER: databot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-databot_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-databot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    platform: linux/amd64
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://databot:${POSTGRES_PASSWORD:-databot_dev}@postgres:5432/databot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    platform: linux/amd64
    ports:
      - "3001:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
