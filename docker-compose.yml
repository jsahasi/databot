services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: databot
      POSTGRES_USER: databot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-databot_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databot"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://databot:${POSTGRES_PASSWORD:-databot_dev}@postgres:5432/databot
      ON24_CLIENT_ID: ${ON24_CLIENT_ID}
      ON24_ACCESS_TOKEN_KEY: ${ON24_ACCESS_TOKEN_KEY}
      ON24_ACCESS_TOKEN_SECRET: ${ON24_ACCESS_TOKEN_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
