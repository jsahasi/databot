stages:
  - lint
  - test
  - build
  - deploy

variables:
  POSTGRES_DB: databot_test
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  NEXUS_REGISTRY: nexus.on24.com:8890
  IMAGE_BACKEND: $NEXUS_REGISTRY/gcp/backend
  IMAGE_FRONTEND: $NEXUS_REGISTRY/gcp/frontend
  IMAGE_MCP: $NEXUS_REGISTRY/gcp/on24-mcp
  DEPLOY_HOST: p-nexus.on24.com
  DEPLOY_USER: admin
  DEPLOY_DIR: /opt/apps/$CI_PROJECT_NAME

lint:backend:
  stage: lint
  image: python:3.12-slim
  script:
    - cd backend
    - pip install ruff mypy
    - ruff check app/
    - ruff format --check app/
  rules:
    - changes:
        - backend/**/*

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run typecheck
  rules:
    - changes:
        - frontend/**/*

test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
  variables:
    DATABASE_URL: postgresql+asyncpg://test:test@postgres:5432/databot_test
  script:
    - cd backend
    - pip install -e ".[dev]"
    - pytest tests/ -v --cov=app --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
  rules:
    - changes:
        - backend/**/*

test:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run test -- --coverage
  rules:
    - changes:
        - frontend/**/*

.build-common: &build-common
  stage: build
  image: p-eng05.on24.com:8888/gcp/gitlab-builder:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  before_script:
    - echo "$NEXUS_PASSWORD" | docker login $NEXUS_REGISTRY -u "$NEXUS_USER" --password-stdin
  after_script:
    - docker logout $NEXUS_REGISTRY

build:backend:
  <<: *build-common
  script:
    - docker build -t $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA ./backend
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA

build:frontend:
  <<: *build-common
  script:
    - docker build -t $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA

build:mcp:
  <<: *build-common
  script:
    - docker build -t $IMAGE_MCP:$CI_COMMIT_SHORT_SHA ./on24-mcp
    - docker push $IMAGE_MCP:$CI_COMMIT_SHORT_SHA

deploy:dev:
  stage: deploy
  image: p-eng05.on24.com:8888/gcp/gitlab-builder:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: dev
    url: http://$DEPLOY_HOST:3001
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        set -e
        mkdir -p $DEPLOY_DIR
        echo '$NEXUS_PASSWORD' | docker login $NEXUS_REGISTRY -u '$NEXUS_USER' --password-stdin
        cd $DEPLOY_DIR
        export IMAGE_BACKEND=\"$IMAGE_BACKEND\"
        export IMAGE_FRONTEND=\"$IMAGE_FRONTEND\"
        export IMAGE_MCP=\"$IMAGE_MCP\"
        export IMAGE_TAG=\"$CI_COMMIT_SHORT_SHA\"
        docker compose pull
        docker compose up -d --remove-orphans
        docker image prune -f
        docker logout $NEXUS_REGISTRY
      "
